<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Подарки для Рады 🎀</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #fff8fb;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  canvas#balloonCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 0 1.25rem 4rem;
  }

  .header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 600;
    color: #d4537e;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }

  .header-subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: #993556;
  }

  .stars-row {
    font-size: 1.2rem;
    letter-spacing: 6px;
    margin-top: 0.5rem;
    color: #f0997b;
  }

  .invite-card {
    background: #fff5f9;
    border: 0.5px solid #f4c0d1;
    border-radius: 16px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.5rem;
  }

  .invite-label {
    font-size: 11px;
    font-weight: 700;
    color: #993556;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .invite-textarea {
    width: 100%;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    line-height: 1.85;
    color: #4b1528;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    min-height: 130px;
  }

  .invite-textarea::placeholder { color: #f4c0d1; font-style: italic; }

  .divider {
    height: 0.5px;
    background: #f4c0d1;
    margin: 1.5rem 0;
    opacity: 0.6;
  }

  .admin-card {
    background: #fff0f5;
    border: 0.5px solid #f4c0d1;
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
  }

  .admin-title {
    font-size: 13px;
    font-weight: 700;
    color: #993556;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .add-form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .add-input {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    padding: 9px 13px;
    border: 0.5px solid #f4c0d1;
    border-radius: 10px;
    background: #fff;
    color: #4b1528;
    outline: none;
    flex: 1;
    min-width: 160px;
  }

  .add-input:focus { border-color: #d4537e; }
  .add-input::placeholder { color: #f4c0d1; }

  .btn-add {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 9px 20px;
    border-radius: 10px;
    border: none;
    background: #d4537e;
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-add:hover { background: #993556; }
  .btn-add:disabled { background: #f4c0d1; cursor: not-allowed; }

  .gifts-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: #d4537e;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .gifts-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .gift-card {
    background: #fff;
    border: 0.5px solid #f4c0d1;
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: opacity 0.2s;
  }

  .gift-card.taken {
    opacity: 0.55;
    background: #fdf5f8;
  }

  .gift-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #fbeaf0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .gift-icon i { font-size: 20px; color: #d4537e; }
  .gift-card.taken .gift-icon { background: #f0e8eb; }
  .gift-card.taken .gift-icon i { color: #b08090; }

  .gift-info { flex: 1; min-width: 0; }

  .gift-name {
    font-size: 14px;
    font-weight: 700;
    color: #3a1020;
    line-height: 1.4;
  }

  .gift-card.taken .gift-name {
    text-decoration: line-through;
    color: #b08090;
  }

  .gift-meta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .gift-art { font-size: 11px; color: #b08090; }

  .gift-link {
    font-size: 12px;
    color: #d4537e;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .gift-link:hover { text-decoration: underline; }

  .taken-badge {
    font-size: 11px;
    font-weight: 700;
    color: #993556;
    background: #fbeaf0;
    border-radius: 6px;
    padding: 2px 8px;
  }

  .gift-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .check-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #993556;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  .check-label input[type=checkbox] {
    width: 18px;
    height: 18px;
    accent-color: #d4537e;
    cursor: pointer;
  }

  .btn-del {
    background: none;
    border: none;
    cursor: pointer;
    color: #d4b0bc;
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
    line-height: 1;
    transition: color 0.15s;
  }
  .btn-del:hover { color: #e24b4a; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #c090a0;
    font-size: 14px;
    font-style: italic;
  }

  .status-bar {
    text-align: center;
    font-size: 12px;
    color: #c090a0;
    margin-top: 1.5rem;
    min-height: 18px;
  }

  .status-bar.error { color: #e24b4a; }
  .status-bar.ok { color: #1d9e75; }

  @media (max-width: 480px) {
    .header-title { font-size: 1.8rem; }
    .add-form { flex-direction: column; }
    .gift-card { padding: 12px 14px; gap: 10px; }
    .check-label span { display: none; }
  }
</style>
</head>
<body>

<canvas id="balloonCanvas"></canvas>

<div class="page-wrap">

  <div class="header">
    <div class="header-title">Подарки для Рады 🎀</div>
    <div class="header-subtitle">1 годик</div>
    <div class="stars-row">✦ ✦ ✦</div>
  </div>

  <div class="invite-card">
    <div class="invite-label">Приглашение</div>
    <textarea class="invite-textarea" rows="5">Дорогие друзья и близкие! 🌸

Наша малышка Рада отмечает свой первый день рождения!
Мы будем рады видеть вас на нашем празднике.

Если вы хотите сделать Раде подарок — выберите что-то из списка ниже и отметьте галочкой, чтобы другие знали о вашем выборе 🎁</textarea>
  </div>

  <div class="divider"></div>

  <div class="admin-card" id="adminPanel">
    <div class="admin-title"><i class="ti ti-plus"></i> Добавить подарок</div>
    <div class="add-form">
      <input class="add-input" id="inputArticle" placeholder="Артикул WB (цифры) или ссылка" />
      <input class="add-input" id="inputName" placeholder="Название подарка" style="flex:1.5" />
      <button class="btn-add" id="btnAdd" onclick="addGift()">Добавить</button>
    </div>
  </div>

  <div class="gifts-title"><i class="ti ti-gift"></i> Список подарков</div>
  <div class="gifts-list" id="giftsList"></div>
  <div class="empty-state" id="emptyState" style="display:none">Пока нет ни одного подарка — добавьте первый 🎈</div>

  <div class="status-bar" id="statusBar">Загрузка...</div>

</div>

<script>
const BIN_ID = '6a2ae3cef5f4af5e29e06cd8';
const API_KEY = '$2a$10$h2ygguqF.4l0/s2qxXNGw.EqZw3OG.u3OnGtrAnqUvakmsvqQTSAu';
const BASE = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

let gifts = [];
let saving = false;

function setStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}

async function loadGifts() {
  try {
    const r = await fetch(BASE + '/latest', {
      method: 'GET',
      headers: {
        'X-Master-Key': API_KEY,
        'X-Bin-Meta': 'false'
      }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    gifts = (data.gifts) || (data.record && data.record.gifts) || [];
    renderGifts();
    setStatus('Обновлено только что', 'ok');
  } catch(e) {
    setStatus('Ошибка загрузки: ' + e.message, 'error');
  }
}

async function saveGifts() {
  if (saving) return;
  saving = true;
  setStatus('Сохранение...');
  try {
    const r = await fetch(BASE, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY,
        'X-Bin-Meta': 'false'
      },
      body: JSON.stringify({ gifts })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    setStatus('Сохранено ✓', 'ok');
  } catch(e) {
    setStatus('Ошибка сохранения: ' + e.message, 'error');
  }
  saving = false;
}

function getWbUrl(art) {
  if (!art) return null;
  if (art.startsWith('http')) return art;
  if (/^\d+$/.test(art.trim())) return 'https://www.wildberries.ru/catalog/' + art.trim() + '/detail.aspx';
  return null;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderGifts() {
  const list = document.getElementById('giftsList');
  const empty = document.getElementById('emptyState');
  if (!gifts.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = gifts.map((g, i) => {
    const wbUrl = getWbUrl(g.article);
    const artClean = g.article && /^\d+$/.test(g.article.trim()) ? g.article.trim() : '';
    return `
    <div class="gift-card ${g.taken ? 'taken' : ''}">
      <div class="gift-icon"><i class="ti ti-gift"></i></div>
      <div class="gift-info">
        <div class="gift-name">${esc(g.name)}</div>
        <div class="gift-meta-row">
          ${artClean ? `<span class="gift-art">Арт: ${artClean}</span>` : ''}
          ${wbUrl ? `<a class="gift-link" href="${wbUrl}" target="_blank"><i class="ti ti-external-link"></i> Открыть на WB</a>` : ''}
          ${g.taken ? `<span class="taken-badge">Занято</span>` : ''}
        </div>
      </div>
      <div class="gift-actions">
        <label class="check-label">
          <input type="checkbox" ${g.taken ? 'checked' : ''} onchange="toggleTaken(${i}, this.checked)" />
          <span>${g.taken ? 'Занято' : 'Выбрать'}</span>
        </label>
        <button class="btn-del" onclick="deleteGift(${i})" title="Удалить"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

async function addGift() {
  const art = document.getElementById('inputArticle').value.trim();
  const name = document.getElementById('inputName').value.trim();
  if (!art && !name) return;
  gifts.push({ article: art, name: name || 'Подарок', taken: false });
  renderGifts();
  document.getElementById('inputArticle').value = '';
  document.getElementById('inputName').value = '';
  await saveGifts();
}

async function toggleTaken(i, val) {
  gifts[i].taken = val;
  renderGifts();
  await saveGifts();
}

async function deleteGift(i) {
  gifts.splice(i, 1);
  renderGifts();
  await saveGifts();
}

document.getElementById('inputName').addEventListener('keydown', e => { if (e.key === 'Enter') addGift(); });
document.getElementById('inputArticle').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inputName').focus(); });

loadGifts();
setInterval(loadGifts, 15000);

// Balloons
const canvas = document.getElementById('balloonCanvas');
const ctx = canvas.getContext('2d');
const COLORS = ['#F4C0D1','#ED93B1','#F5C4B3','#FAC775','#9FE1CB','#B5D4F4','#CEAFEC'];
let balloons = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function makeBalloon(fromBottom) {
  return {
    x: Math.random() * canvas.width,
    y: fromBottom ? canvas.height + 60 + Math.random() * 150 : Math.random() * canvas.height,
    r: 18 + Math.random() * 18,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    speedY: 0.35 + Math.random() * 0.55,
    drift: (Math.random() - 0.5) * 0.45,
    phase: Math.random() * Math.PI * 2,
    opacity: 0.4 + Math.random() * 0.3
  };
}

function drawBalloon(b) {
  ctx.save();
  ctx.globalAlpha = b.opacity;
  ctx.beginPath();
  ctx.ellipse(b.x, b.y, b.r * 0.82, b.r, 0, 0, Math.PI * 2);
  ctx.fillStyle = b.color;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(b.x, b.y + b.r);
  for (let t = 0; t <= 1; t += 0.08) {
    ctx.lineTo(b.x + Math.sin(b.phase + t * Math.PI * 2) * b.r * 0.35, b.y + b.r + t * b.r * 2.5);
  }
  ctx.strokeStyle = b.color;
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  balloons.forEach(b => {
    b.y -= b.speedY;
    b.x += b.drift;
    b.phase += 0.018;
    if (b.y + b.r < -20) Object.assign(b, makeBalloon(true));
    drawBalloon(b);
  });
  requestAnimationFrame(animate);
}

resize();
balloons = Array.from({length: 18}, () => makeBalloon(false));
animate();
window.addEventListener('resize', resize);
</script>
</body>
</html>
